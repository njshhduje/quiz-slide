<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Viewer</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        video { display: none; width: 100vw; height: 100vh; object-fit: contain; }
        .active video { display: block; }
    </style>
</head>
<body>
    <video id="v" autoplay playsinline muted></video>
    <script>
        const socket = io();
        const v = document.getElementById('v');
        let pc;
        socket.emit('join-viewer');
        socket.on('offer', async (offer) => {
            pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            pc.ontrack = e => { v.srcObject = e.streams[0]; document.body.className = 'active'; };
            pc.onicecandidate = e => { if (e.candidate) socket.emit('candidate', e.candidate); };
            await pc.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            socket.emit('answer', pc.localDescription);
        });
        socket.on('candidate', c => pc && pc.addIceCandidate(new RTCIceCandidate(c)));
    </script>
</body>
</html>
