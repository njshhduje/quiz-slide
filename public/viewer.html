<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Viewer</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        video { display: none; width: 100vw; height: 100vh; object-fit: contain; }
        .active video { display: block; }
    </style>
</head>
<body>
    <video id="v" autoplay playsinline muted></video>
    <script>
        const socket = io();
        const v = document.getElementById('v');
        let pc;

        // 【重要】開いた瞬間に管理者に通知する
        socket.emit('join-viewer');

        socket.on('offer', async (data) => {
            console.log("管理者から映像信号を受信しました");
            pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            
            pc.ontrack = (e) => {
                v.srcObject = e.streams[0];
                document.body.className = 'active';
                v.play().catch(err => console.log("再生にユーザー操作が必要な場合があります"));
            };

            pc.onicecandidate = (e) => {
                if (e.candidate) socket.emit('candidate', { to: data.from, candidate: e.candidate });
            };

            await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            socket.emit('answer', { to: data.from, answer: answer });
        });

        socket.on('candidate', (data) => {
            if (pc) pc.addIceCandidate(new RTCIceCandidate(data.candidate));
        });
    </script>
</body>
</html>
