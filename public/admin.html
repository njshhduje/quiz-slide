<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>管理者 - 画面共有</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f2f5; }
        video { width: 100%; max-width: 600px; border-radius: 8px; background: #000; margin-top: 20px; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>管理者パネル</h1>
    <button id="startBtn">画面共有を開始する</button>
    <br>
    <video id="localVideo" autoplay playsinline muted></video>

    <script>
        const socket = io();
        let stream, pc;
        const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        document.getElementById('startBtn').onclick = async () => {
            stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
            document.getElementById('localVideo').srcObject = stream;
            sendOffer();
        };

        async function sendOffer() {
            if (pc) pc.close();
            pc = new RTCPeerConnection(config);
            stream.getTracks().forEach(track => pc.addTrack(track, stream));
            pc.onicecandidate = (e) => { if (e.candidate) socket.emit('candidate', e.candidate); };
            
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            socket.emit('offer', pc.localDescription);
        }

        socket.on('viewer-joined', () => { if (stream) sendOffer(); });
        socket.on('answer', (ans) => pc.setRemoteDescription(new RTCSessionDescription(ans)));
        socket.on('candidate', (cand) => pc.addIceCandidate(new RTCIceCandidate(cand)));
    </script>
</body>
</html>
