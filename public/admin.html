<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>管理者 - 画面共有</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        video { width: 100%; border-radius: 8px; background: #000; margin-top: 15px; }
        button { background: #007bff; color: white; border: none; padding: 12px 24px; border-radius: 6px; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #0056b3; }
        .status { color: #666; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>管理者用 配信パネル</h1>
        <button id="startBtn">画面共有を開始する</button>
        <div class="status" id="statusText">停止中</div>
        <video id="localVideo" autoplay playsinline muted></video>
    </div>

    <script>
        const socket = io();
        const startBtn = document.getElementById('startBtn');
        const localVideo = document.getElementById('localVideo');
        const statusText = document.getElementById('statusText');
        
        let peerConnection;
        let localStream;
        const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        // 共有開始ボタン
        startBtn.onclick = async () => {
            try {
                localStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                localVideo.srcObject = localStream;
                statusText.innerText = "配信中...";
                startBroadcasting();
            } catch (err) {
                console.error("Error: " + err);
            }
        };

        async function startBroadcasting() {
            peerConnection = new RTCPeerConnection(config);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) socket.emit('candidate', event.candidate);
            };

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            socket.emit('offer', offer);
        }

        // 閲覧者が新しく入ってきたら、再度Offerを送ってあげる
        socket.on('viewer-joined', () => {
            if (localStream) {
                console.log("新しい閲覧者のために再接続を開始します");
                startBroadcasting();
            }
        });

        socket.on('answer', async (answer) => {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
        });

        socket.on('candidate', async (candidate) => {
            await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
        });
    </script>
</body>
</html>
