<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Admin - Auto Re-offer</title>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body style="font-family:sans-serif; text-align:center;">
    <h1>管理者配信パネル</h1>
    <button id="startBtn" style="padding:10px 20px;">画面共有を開始</button>
    <p id="count">接続中の閲覧者: 0人</p>
    <video id="localVideo" autoplay playsinline muted style="width:400px; background:#000;"></video>

    <script>
        const socket = io();
        const peerConnections = {}; 
        let localStream;
        const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        document.getElementById('startBtn').onclick = async () => {
            localStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
            document.getElementById('localVideo').srcObject = localStream;
            
            // 配信開始時に、すでにページを開いて待機していた人たちへOfferを送る
            socket.emit('join-viewer'); 
        };

        // 【重要】後から入った閲覧者への自動対応
        socket.on('viewer-joined', async (viewerId) => {
            if (!localStream) return; // まだ配信していなければ無視

            console.log("新しい閲覧者が参加しました:", viewerId);
            
            // その人専用のコネクションを作成
            const pc = new RTCPeerConnection(config);
            peerConnections[viewerId] = pc;

            // 自分の映像トラックをすべて追加
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

            pc.onicecandidate = (e) => {
                if (e.candidate) socket.emit('candidate', { to: viewerId, candidate: e.candidate });
            };

            // 新しいOfferを作成して、その閲覧者だけに送る
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            socket.emit('offer', { to: viewerId, offer: offer });
            
            updateCount();
        });

        socket.on('answer', async (data) => {
            const pc = peerConnections[data.from];
            if (pc) await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
        });

        socket.on('candidate', async (data) => {
            const pc = peerConnections[data.from];
            if (pc) await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
        });

        socket.on('user-left', (id) => {
            if (peerConnections[id]) {
                peerConnections[id].close();
                delete peerConnections[id];
                updateCount();
            }
        });

        function updateCount() {
            document.getElementById('count').innerText = `接続中の閲覧者: ${Object.keys(peerConnections).length}人`;
        }
    </script>
</body>
</html>
