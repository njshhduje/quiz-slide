<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Admin</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #eee; }
        video { width: 100%; max-width: 500px; background: #000; }
    </style>
</head>
<body>
    <h1>管理者画面</h1>
    <button id="btn">画面共有を開始</button>
    <hr>
    <video id="v" autoplay playsinline muted></video>
    <script>
        const socket = io();
        let stream, pc;
        document.getElementById('btn').onclick = async () => {
            stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
            document.getElementById('v').srcObject = stream;
            send();
        };
        async function send() {
            pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            stream.getTracks().forEach(t => pc.addTrack(t, stream));
            pc.onicecandidate = e => { if (e.candidate) socket.emit('candidate', e.candidate); };
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            socket.emit('offer', pc.localDescription);
        }
        socket.on('viewer-joined', () => stream && send());
        socket.on('answer', a => pc.setRemoteDescription(new RTCSessionDescription(a)));
        socket.on('candidate', c => pc.addIceCandidate(new RTCIceCandidate(c)));
    </script>
</body>
</html>
